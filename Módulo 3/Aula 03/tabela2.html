<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table border="2">
        <caption><strong>Estoque de perfiféricos</strong></caption>
        <thead>
        <tr>
            <th>ID</th>
            <th>Produto</th>
            <th>Qtd</th>
            <th>Preço</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>011</td>
            <td>Teclado Mecânico</td>
            <td>15</td>
            <td>R$ 250,00</td>
        </tr>
        <tr>
            <td>002</td>
            <td>Mouse gamer</td>
            <td>30</td>
            <td>R$120,00</td>
        </tr>
        <tr>
            <td>003</td>
            <td>HeadSet RGB</td>
            <td>10</td>
            <td>R$300,00</td>
        </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Valor Total de estoque:</td>
                <td>R$10.350,00</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
