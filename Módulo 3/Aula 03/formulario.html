<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1><strong>Cadastro</strong></h1>
    <form action="/cadastro" method="post">
        <fieldset>
        <legend>Dados pessoais</legend>
        <label for="nome">Nome completo:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required>
        <label for="idade">Idade:</label>
        <input type="number" min="18" id="idade" name="idade" placeholder="Idade minima 18" required>
        </fieldset>
        <br>
        <fieldset>
        <legend>Ingresso</legend>
        <label for="ingresso">Tipo de Ingresso:</label>
        <label><input type="radio" id="ingresso" name="ingresso" value="Padrão">Padrão</label>
        <label><input type="radio" id="ingresso" name="ingresso" value="VIP">VIP</label>
        </fieldset>
        <br>
        <fieldset>
        <label for="estado">País:</label>
        <select id="pais" name="pais" required>
            <option value="">Selecione um País...</option>
            <option value="br">Brasil</option>
            <option value="ar">Argentina</option>
            <option value="usa">Estados Unidos</option>
            <option value="uk">Inglaterra</option>
        </select>
        </fieldset>
        <br>
        <button type="submit">Enviar cadastro</button>
    </form>
</body>
</html>
