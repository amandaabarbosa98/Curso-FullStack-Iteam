<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table border="2">
        <caption><strong>Minha Tabela</strong></caption>
        <tr>
            <th>Horário</th>
            <th>Segunda</th>
            <th>Terça</th>
            <th>Quarta</th>
            <th>Quinta</th>
            <th>Sexta</th>
        </tr>
        <tr>
            <td>08:00</td>
            <td>HTML</td>
            <td>CSS</td>
            <td rowspan="2">Projeto</td>
            <td>HTML</td>
            <td>CSS</td>
        </tr>
        <tr>
            <td>09:00</td>
            <td>HTML</td>
            <td>CSS</td>
            <td>JS</td>
            <td>JS</td>
        </tr>
        <tr>
            <td>10:00</td>
            <td colspan="5">Intervalo</td>
        </tr>
        <tr>
            <td>10:30</td>
            <td>JS</td>
            <td>JS</td>
            <td>HTML</td>
            <td>CSS</td>
            <td>Projeto</td>
        </tr>
        <tfoot>
            <tr>
                <td colspan="6">Rodape da tabela</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
